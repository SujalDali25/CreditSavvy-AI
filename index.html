<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreditSavvy AI Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #0f1115;
            --chat-bg: rgba(26, 29, 36, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #00d2ff;
            --primary-gradient: linear-gradient(135deg, #3a7bd5 0%, #3a6073 100%);
            --accent: #2193b0;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --user-msg: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --bot-msg: rgba(45, 55, 72, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(58, 123, 213, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 210, 255, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--chat-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .header-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .chat-box {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Custom Scrollbar */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: messageSlide 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
            white-space: pre-line;
        }

        @keyframes messageSlide {
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        .bot-message {
            align-self: flex-start;
            background: var(--bot-msg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .bot-message strong {
            color: var(--primary);
        }

        .input-area {
            padding: 24px 32px;
            border-top: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            display: flex;
            gap: 16px;
        }

        .input-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 24px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-box:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 210, 255, 0.2);
        }

        .send-btn {
            background: var(--primary-gradient);
            border: none;
            border-radius: 16px;
            width: 56px;
            height: 56px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(58, 123, 213, 0.6);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-icon {
            fill: white;
            width: 24px;
            height: 24px;
        }

        .loading-dots {
            display: flex;
            gap: 6px;
            align-items: center;
            height: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <div>
                <h1 class="header-title">CreditSavvy AI</h1>
                <div class="header-subtitle">Intelligent Rewards & Points Optimization</div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981;"></span>
                <span style="font-size: 0.85rem; color: var(--text-muted);">System Online</span>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                Hello! I am CreditSavvy AI. Tell me about an upcoming purchase (e.g., "I'm booking flights worth Rs 15,000") or ask me about reward redemption!
            </div>
        </div>

        <div class="input-area">
            <input type="text" class="input-box" id="userInput" placeholder="Ask about a purchase or reward points..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">
                <svg class="send-icon" viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        function formatBotResponse(text) {
            // Convert markdown-style bold to HTML
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
            msgDiv.innerHTML = sender === 'bot' ? formatBotResponse(text) : text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.classList.add('message', 'bot-message');
            loadingDiv.id = 'loadingMsg';
            loadingDiv.innerHTML = `
                <div class="loading-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeLoading() {
            const loadingMsg = document.getElementById('loadingMsg');
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message
            appendMessage(text, 'user');
            userInput.value = '';

            // Show loading state
            showLoading();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                removeLoading();

                if (data.explanation) {
                    appendMessage(data.explanation, 'bot');
                } else if (data.error) {
                    appendMessage("Error: " + data.error, 'bot');
                } else {
                    appendMessage("I couldn't process that properly.", 'bot');
                }

            } catch (error) {
                console.error('Error:', error);
                removeLoading();
                appendMessage("Failed to connect to the backend server. Please make sure the server is running.", 'bot');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
